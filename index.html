<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.O.P Systems</title>
    <style>
        /* Retro Terminal Style */
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #0d0d0d; 
            color: #00ff41; 
            padding: 40px; 
            line-height: 1.6;
            display: flex;
            justify-content: center;
        }
        .container { 
            max-width: 700px; 
            width: 100%;
            border: 1px solid #00ff41; 
            padding: 30px; 
            box-shadow: 0 0 15px rgba(0,255,65,0.2); 
        }
        h1 { 
            text-align: center; 
            letter-spacing: 5px; 
            border-bottom: 1px solid #00ff41;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .app-section {
            margin-bottom: 40px;
            padding: 15px;
            border: 1px dashed #333;
        }
        .app-title { font-weight: bold; font-size: 1.2em; margin-bottom: 10px; }
        
        .links { margin-top: 15px; }
        
        a { 
            color: #00ff41; 
            text-decoration: none; 
            border: 1px solid #00ff41; 
            padding: 8px 15px; 
            display: inline-block; 
            margin-right: 10px;
            margin-bottom: 10px;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        a:hover { 
            background: #00ff41; 
            color: #000; 
        }
        .footer { 
            margin-top: 40px; 
            text-align: center; 
            font-size: 0.7em; 
            color: #444;
            border-top: 1px solid #222;
            padding-top: 20px;
        }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>M.O.P SYSTEMS<span class="blink">_</span></h1>

        <div class="app-section">
            <div class="app-title">> trmPING</div>
            <div class="links">
                <a href="https://play.google.com/store/apps/details?id=com.mop.trmping" target="_blank">PLAY STORE</a>
                <a href="https://mop-systems.github.io/trmping/privacy.html">PRIVACY POLICY</a>
            </div>
        </div>

        <div class="footer">
            
        </div>
    </div>
</body>
</html>
