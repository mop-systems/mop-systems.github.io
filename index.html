<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.O.P Systems</title>
    <style>
        /* Moderni Retro-Terminaali - Dashed Edition */
        body { 
            font-family: Consolas, 'Courier New', Courier, monospace; 
            background-color: #0a0a0a; 
            color: #00ff41; 
            padding: 40px; 
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            min-height: 100vh;
            margin: 0;
            box-sizing: border-box;
            overflow-x: hidden; 
            
            /* Taustan staattinen CRT-juovitus */
            background-image: linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px);
            background-size: 100% 4px;
        }

        .container { 
            max-width: 700px; 
            width: 100%;
            border: 1px dashed rgba(0, 255, 65, 0.5); 
            padding: 30px; 
            box-shadow: 0 0 20px rgba(0,255,65,0.05), inset 0 0 20px rgba(0,255,65,0.05); 
            z-index: 1; 
            position: relative; 
            overflow: hidden; 
            /* Pääkontainerin tausta */
            background-color: rgba(0, 0, 0, 0.8); 
        }

        /* Koko laatikon pyyhkivä skannausjuova */
        .container::after {
            content: "";
            position: absolute; 
            left: 0;
            width: 100%;
            height: 100px; 
            background: linear-gradient(to bottom, rgba(0,255,65,0) 0%, rgba(0,255,65,0.08) 50%, rgba(0,255,65,0) 100%);
            z-index: 10;
            pointer-events: none;
            animation: crt-sweep 6s linear infinite; 
        }
        
        /* MUUTETTU: Otsikko on nyt oma erottuva laatikkonsa */
        h1 { 
            text-align: left; 
            font-size: 1.4em;
            letter-spacing: 2px; 
            
            /* Tehdään otsikosta laatikko lisäämällä yläreuna */
            border-top: 1px dashed rgba(0, 255, 65, 0.3);
            border-bottom: 1px dashed rgba(0, 255, 65, 0.3);
            
            /* MUUTOS: Erottuva taustaväri otsikkoalueelle */
            background-color: rgba(0, 255, 65, 0.06);
            
            /* Säädetään asemoitumaan reunoihin asti */
            margin-top: -30px; /* Kompensoidaan .container padding */
            margin-bottom: 30px;
            margin-left: -30px;
            margin-right: -30px;
            
            /* Sisäpaikannus tekstille uuden laatikon sisällä */
            padding-left: 30px;
            padding-right: 30px;
            padding-top: 20px;
            padding-bottom: 20px;
            
            text-shadow: 0 0 8px rgba(0, 255, 65, 0.5);
            animation: systemGlitch 5s infinite;
        }
        
        /* CSS Grid sovelluksille */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            align-items: start; 
        }

        /* MUUTETTU: Modernit katkoviivalliset laatikot, vahvempi tausta */
        .app-section {
            padding: 20px;
            border: 1px dashed rgba(0, 255, 65, 0.4); 
            
            /* MUUTOS: Vahvistettu pohjaväri, jotta erottuu paremmin containerista */
            background: rgba(0, 255, 65, 0.04); 
            
            transition: all 0.3s ease;
            position: relative; /* z-indexia varten, jotta scanline menee yli */
        }
        
        .app-section:hover {
            border: 1px dashed #00ff41;
            box-shadow: inset 0 0 15px rgba(0,255,65,0.05);
            /* MUUTOS: Hover-tausta kirkastuu aavistuksen */
            background: rgba(0, 255, 65, 0.08);
        }

        .app-title { 
            font-weight: bold; 
            font-size: 1.2em; 
            margin-bottom: 15px; 
            color: #fff; 
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.4);
        }
        
        .links { margin-top: 15px; }
        
        /* Napit katkoviivoilla */
        a { 
            color: #00ff41; 
            text-decoration: none; 
            border: 1px dashed rgba(0, 255, 65, 0.4); 
            padding: 6px 12px; 
            display: inline-block; 
            margin-right: 5px;
            margin-bottom: 8px;
            font-size: 0.85em;
            transition: all 0.2s ease-in-out;
        }
        
        a:hover { 
            background: rgba(0, 255, 65, 0.1); 
            color: #00ff41; 
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
            border: 1px dashed #00ff41; 
        }
        
        .blink { animation: blinker 1s linear infinite; }
        
        @keyframes blinker { 50% { opacity: 0; } }

        @keyframes crt-sweep {
            0% { top: -20%; }
            100% { top: 120%; }
        }

        @keyframes systemGlitch {
            0%, 96% { transform: translate(0); text-shadow: 0 0 8px rgba(0, 255, 65, 0.5); }
            97% { transform: translate(2px, 1px); text-shadow: -2px 0 #ff003c, 2px 0 #00eaff; }
            98% { transform: translate(-2px, -1px); text-shadow: 2px 0 #ff003c, -2px 0 #00eaff; }
            99% { transform: translate(2px, -1px); text-shadow: -2px 0 #ff003c, 2px 0 #00eaff; }
            100% { transform: translate(0); text-shadow: 0 0 8px rgba(0, 255, 65, 0.5); }
        }

        /* KATTAVA MOBIILIOPTIMOINTI (Korjattu!) */
        @media (max-width: 600px) {
            body { padding: 15px; }
            .container { padding: 15px; }
            
            h1 {
                font-size: 1.2em;
                margin-bottom: 25px;
                
                /* TÄSSÄ SE KORJAUS: Mobiilin negatiivinen ylämarginaali vastaa nyt 15px paddingia! */
                margin-top: -15px; 
                margin-left: -15px;
                margin-right: -15px;
                
                padding-left: 15px;
                padding-right: 15px;
                padding-top: 15px;
                padding-bottom: 15px;
            }
            
            .app-grid { 
                grid-template-columns: 1fr; 
                gap: 15px;
            }
            
            /* Vain sovellusnapit venytetään, ei @-merkkiä */
            .links a {
                display: block;
                text-align: center;
                margin-right: 0;
                margin-bottom: 10px;
                padding: 12px; 
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>> M.O.P Systems<span class="blink">_</span></h1>

        <div class="app-grid">
            <div class="app-section">
                <div class="app-title">trmPING</div>
                <div class="links">
                    <a href="https://play.google.com/store/apps/details?id=com.mop.trmping" target="_blank">play store</a>
                    <a href="https://mop-systems.github.io/trmping/privacy.html">privacy policy</a>
                </div>
            </div>

    </div> </body>
</html>
