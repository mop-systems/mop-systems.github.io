<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.O.P Systems</title>
    <style>
        /* Retro Terminal Style */
        body { 
            font-family: Consolas, 'Courier New', Courier, monospace; 
            background-color: #0d0d0d; 
            color: #00ff41; 
            padding: 40px; 
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* <--- TÄMÄ ESTÄÄ PÄÄLAATIKON VENYMISEN ALAS ASTI */
            min-height: 100vh;
            margin: 0;
            box-sizing: border-box;
            overflow-x: hidden;
            
            /* CRT-scanline (paikallaan pysyvä juovitus) */
            background-image: linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 100% 4px;
        }

        /* Hitaasti alaspäin pyyhkivä monitorin päivitysjuova */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 15vh;
            background: linear-gradient(to bottom, rgba(0,255,65,0) 0%, rgba(0,255,65,0.03) 50%, rgba(0,255,65,0) 100%);
            z-index: 10;
            pointer-events: none;
            animation: crt-sweep 8s linear infinite;
        }

        .container { 
            max-width: 700px; 
            width: 100%;
            border: 1px solid #00ff41; 
            padding: 30px; 
            box-shadow: 0 0 15px rgba(0,255,65,0.1), inset 0 0 15px rgba(0,255,65,0.05); 
            z-index: 1; 
        }
        
        /* Otsikon Glitch-efekti */
        h1 { 
            text-align: center; 
            letter-spacing: 5px; 
            border-bottom: 1px solid #00ff41;
            padding-bottom: 20px;
            margin-bottom: 30px;
            text-shadow: 0 0 8px rgba(0, 255, 65, 0.6);
            animation: systemGlitch 5s infinite;
        }
        
        /* CSS Grid sovelluksille */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            align-items: start; 
        }

        .app-section {
            padding: 15px;
            border: 1px dashed #333;
            transition: border 0.3s, box-shadow 0.3s;
        }
        
        .app-section:hover {
            border: 1px dashed #00ff41;
            box-shadow: inset 0 0 10px rgba(0,255,65,0.05);
        }

        .app-title { font-weight: bold; font-size: 1.2em; margin-bottom: 10px; }
        
        .links { margin-top: 15px; }
        
        a { 
            color: #00ff41; 
            text-decoration: none; 
            border: 1px solid #00ff41; 
            padding: 8px 15px; 
            display: inline-block; 
            margin-right: 5px;
            margin-bottom: 10px;
            font-size: 0.85em;
            transition: all 0.2s ease-in-out;
        }
        
        a:hover { 
            background: #00ff41; 
            color: #0d0d0d; 
            box-shadow: 0 0 12px #00ff41;
        }
        
        .blink { animation: blinker 1s linear infinite; }
        
        @keyframes blinker { 50% { opacity: 0; } }

        @keyframes crt-sweep {
            0% { transform: translateY(-15vh); }
            100% { transform: translateY(115vh); }
        }

        @keyframes systemGlitch {
            0%, 96% { transform: translate(0); text-shadow: 0 0 8px rgba(0, 255, 65, 0.6); }
            97% { transform: translate(2px, 1px); text-shadow: -2px 0 #ff003c, 2px 0 #00eaff; }
            98% { transform: translate(-2px, -1px); text-shadow: 2px 0 #ff003c, -2px 0 #00eaff; }
            99% { transform: translate(2px, -1px); text-shadow: -2px 0 #ff003c, 2px 0 #00eaff; }
            100% { transform: translate(0); text-shadow: 0 0 8px rgba(0, 255, 65, 0.6); }
        }

        /* Mobiiliresponsiivisuus: tiputetaan 1 sarakkeeseen pienillä ruuduilla */
        @media (max-width: 600px) {
            .app-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>M.O.P Systems<span class="blink">_</span></h1>

        <div class="app-grid">
            <div class="app-section">
                <div class="app-title">> trmPING</div>
                <div class="links">
                    <a href="https://play.google.com/store/apps/details?id=com.mop.trmping" target="_blank">PLAY STORE</a>
                    <a href="https://mop-systems.github.io/trmping/privacy.html">PRIVACY POLICY</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
